services:
  backend:
    build: .
    container_name: serviceplyus-backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    container_name: serviceplyus-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/serviceplyus

volumes:
  mongo_data: